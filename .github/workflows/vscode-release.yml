name: VS Code Extension Release

on:
  push:
    tags:
      - 'vscode-v*'
      - 'vscode-pre-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version to release (x.y.z)'
        required: false
      channel:
        description: 'Release channel (stable|prerelease)'
        required: false
        default: 'stable'

jobs:
  check:
    name: Detect release type
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      is_stable: ${{ steps.meta.outputs.is_stable }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Parse tag and detect type
        id: meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.version }}" ]; then
              echo "::error::workflow_dispatch requires 'version' input (x.y.z)."
              exit 1
            fi

            TAG_VERSION="${{ github.event.inputs.version }}"
            CHANNEL="${{ github.event.inputs.channel }}"

            if [ -z "$CHANNEL" ]; then
              CHANNEL="stable"
            fi

            if [ "$CHANNEL" = "prerelease" ]; then
              TAG_NAME="vscode-pre-v${TAG_VERSION}"
              echo "Detected: PRE-RELEASE (workflow_dispatch)"
              echo "is_stable=false" >> "$GITHUB_OUTPUT"
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            else
              TAG_NAME="vscode-v${TAG_VERSION}"
              echo "Detected: STABLE release (workflow_dispatch)"
              echo "is_stable=true" >> "$GITHUB_OUTPUT"
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"

            if [[ "$TAG_NAME" == vscode-pre-v* ]]; then
              TAG_VERSION="${TAG_NAME#vscode-pre-v}"
              echo "Detected: PRE-RELEASE (tag)"
              echo "is_stable=false" >> "$GITHUB_OUTPUT"
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG_NAME" == vscode-v* ]]; then
              TAG_VERSION="${TAG_NAME#vscode-v}"
              echo "Detected: STABLE release (tag)"
              echo "is_stable=true" >> "$GITHUB_OUTPUT"
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tag name ($TAG_NAME) does not match vscode-v* or vscode-pre-v*."
              exit 1
            fi
          fi

          if [[ ! "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Extension version must be plain x.y.z (got: $TAG_VERSION)."
            exit 1
          fi

          PKG_VERSION="$(node -p "require('./vscode-extension/package.json').version")"

          echo "Tag name:        $TAG_NAME"
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match vscode-extension/package.json version ($PKG_VERSION)."
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

          # is_stable / is_prerelease already set above.

  build:
    name: Build Extension
    needs: check
    runs-on: ubuntu-latest
    outputs:
      vsix_name: ${{ steps.package.outputs.vsix_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Package Extension
        id: package
        working-directory: vscode-extension
        run: |
          npm run package
          VSIX_FILE=$(ls *.vsix)
          echo "vsix_name=$VSIX_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: slidev-scholarly-snippets-${{ needs.check.outputs.version }}
          path: vscode-extension/*.vsix

  release:
    name: Release (stable)
    needs: [check, build]
    if: needs.check.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: slidev-scholarly-snippets-${{ needs.check.outputs.version }}
          path: ./vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check.outputs.tag_name }}
          files: ./vsix/*.vsix
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prerelease:
    name: Pre-release
    needs: [check, build]
    if: needs.check.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: slidev-scholarly-snippets-${{ needs.check.outputs.version }}
          path: ./vsix

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check.outputs.tag_name }}
          files: ./vsix/*.vsix
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
