name: CI

on:
  push:
    branches:
      - dev
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slidev-smoke:
    name: Slidev Smoke (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node:
          - '20'
          - '24'
    env:
      CI: true
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build citation helper
        run: pnpm run build:citation-vite

      - name: Verify generated citation helper is committed
        run: |
          git diff --exit-code -- setup/citation-vite.js setup/citation-vite.cjs setup/citation-vite.d.ts
          test -z "$(git ls-files --others --exclude-standard -- setup/citation-vite.js setup/citation-vite.cjs setup/citation-vite.d.ts)"

      - name: Build English example deck
        run: pnpm exec slidev build examples/example.md --out "${RUNNER_TEMP}/slidev-example-en" --without-notes

      - name: Build Academic example deck
        run: pnpm exec slidev build examples/example-academic.md --out "${RUNNER_TEMP}/slidev-example-academic" --without-notes

      - name: Build Chinese example deck
        run: pnpm exec slidev build examples/example-zh.md --out "${RUNNER_TEMP}/slidev-example-zh" --without-notes

  vscode-extension:
    name: VS Code Extension Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: vscode-extension/pnpm-lock.yaml

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: pnpm install --frozen-lockfile

      - name: Compile extension
        working-directory: vscode-extension
        run: pnpm run compile
