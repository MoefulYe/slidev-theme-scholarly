name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    name: Detect release type
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_stable: ${{ steps.meta.outputs.is_stable }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag and detect type
        id: meta
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # Only handle theme tags like:
          #   v1.2.3
          #   v1.2.3-beta.1
          #
          # This workflow may also be triggered by other tag namespaces
          # (e.g. VS Code extension tags) that start with "v" but are not
          # theme releases.
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Skipping: not a theme release tag ($TAG_NAME)"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          # Stable: vX.Y.Z (no prerelease segment)
          # Prerelease: vX.Y.Z-<pre> (has hyphen after patch)
          if [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected: STABLE release"
          elif [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z.-]+$ ]]; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected: PRE-RELEASE"
          else
            echo "::error::Tag version ($TAG_VERSION) is not valid semver."
            exit 1
          fi

  validate:
    name: Validate theme release
    needs: check
    if: needs.check.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build English example deck
        run: pnpm exec slidev build examples/example.md --out "${RUNNER_TEMP}/slidev-release-example-en" --without-notes

      - name: Build Academic example deck
        run: pnpm exec slidev build examples/example-academic.md --out "${RUNNER_TEMP}/slidev-release-example-academic" --without-notes

      - name: Build Chinese example deck
        run: pnpm exec slidev build examples/example-zh.md --out "${RUNNER_TEMP}/slidev-release-example-zh" --without-notes

  release:
    name: Release (stable)
    needs: [check, validate]
    if: needs.check.outputs.is_stable == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract release notes
        run: |
          VERSION="${{ needs.check.outputs.version }}"

          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { found=1 }
              found && printed && $0 ~ "^## \\[" && $0 !~ "^## \\[" ver "\\]" { exit }
              found { print; printed=1 }
            ' CHANGELOG.md > release_notes.md
          fi

          if [ ! -s release_notes.md ]; then
            echo "Release $VERSION" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  prerelease:
    name: Pre-release
    needs: [check, validate]
    if: needs.check.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract release notes
        run: |
          VERSION="${{ needs.check.outputs.version }}"

          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { found=1 }
              found && printed && $0 ~ "^## \\[" && $0 !~ "^## \\[" ver "\\]" { exit }
              found { print; printed=1 }
            ' CHANGELOG.md > release_notes.md
          fi

          if [ ! -s release_notes.md ]; then
            echo "Pre-release $VERSION" > release_notes.md
          fi

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM (dist-tag next)
        run: npm publish --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
