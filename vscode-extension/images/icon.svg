<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Scholarly theme gradient background -->
    <linearGradient id="scholarly_bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="20%" stop-color="#3d5a67"/>
      <stop offset="100%" stop-color="#6a97a8"/>
    </linearGradient>
    <!-- 3D light cone surface gradient - main face -->
    <linearGradient id="cone_face" x1="100" y1="100" x2="50" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Left side of cone for 3D effect -->
    <linearGradient id="cone_left" x1="18" y1="72" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Right side of cone for 3D effect -->
    <linearGradient id="cone_right" x1="78" y1="24" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="32" fill="url(#scholarly_bg)"/>
  
  <!-- 3D Light cone - projector beam as a 3D surface -->
  <!-- Main cone surface (bottom face) -->
  <path d="M100,100 L18,24 L78,24 Z" fill="url(#cone_face)"/>
  <!-- Left side face of cone (top-left edge) -->
  <path d="M100,100 L18,24 L18,72 Z" fill="url(#cone_left)"/>
  <!-- Right side face of cone (top-right edge) -->
  <path d="M100,100 L78,24 L78,72 Z" fill="url(#cone_right)" opacity="0.5"/>
  
  <!-- Slide frame (representing presentation slides) -->
  <rect x="18" y="24" width="60" height="48" rx="4" stroke="white" stroke-width="4" fill="none" opacity="0.95"/>
  
  <!-- Illuminated content lines inside slide -->
  <g stroke="white" stroke-width="3.5" stroke-linecap="round">
    <line x1="26" y1="38" x2="50" y2="38" opacity="0.9"/>
    <line x1="26" y1="50" x2="68" y2="50" opacity="0.8"/>
    <line x1="26" y1="62" x2="42" y2="62" opacity="0.7"/>
  </g>
  
  <!-- Stacked slides behind -->
  <rect x="24" y="76" width="52" height="4" rx="2" fill="white" opacity="0.3"/>
  
  <!-- Sigma symbol (Σ) - centered properly -->
  <g transform="translate(85, 85)">
    <!-- Soft glow effect -->
    <circle cx="16" cy="16" r="18" fill="white" opacity="0.15"/>
    <circle cx="16" cy="16" r="12" fill="white" opacity="0.1"/>
    <!-- Sigma symbol - using dy for proper vertical centering -->
    <text x="16" y="16" dy="0.35em" font-family="Cambria, Georgia, serif" font-size="18" fill="white" text-anchor="middle">Σ</text>
  </g>
</svg>
