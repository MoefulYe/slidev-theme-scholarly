<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Slide frame - larger, fills more space -->
  <rect x="1" y="1" width="16" height="13" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
  
  <!-- Content lines - bolder -->
  <line x1="3.5" y1="5" x2="12" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="3.5" y1="9" x2="9" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  
  <!-- Stacked slides -->
  <line x1="3" y1="16" x2="15" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Sigma - larger and more visible -->
  <text x="20" y="20" font-family="Times, serif" font-size="11" font-weight="bold" fill="currentColor" text-anchor="middle" dominant-baseline="central">Σ</text>
</svg>
